<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERCOBAAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,600;0,700;1,400&family=Great+Vibes&family=Montserrat:wght=300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-bg-dark: #1a0b0e;
            --c-bg-light: #3a1c22;
            --c-primary: #ffb6c1;
            --c-rose-gold: #e0bfb8;
            --c-text-main: #fff0f2;
            --c-text-muted: #d4a5a5;
            
            --font-serif: 'Playfair Display', serif;
            --font-script: 'Great Vibes', cursive;
            --font-sans: 'Montserrat', sans-serif;
            
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            
            --transition-modal: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--c-bg-dark);
        }

        body {
            color: var(--c-text-main);
            font-family: var(--font-sans);
            background-image: radial-gradient(circle at 50% 50%, var(--c-bg-light) 0%, var(--c-bg-dark) 100%);
            position: relative;
        }

        /* CONTAINER PARTIKEL */
        #particle-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .flower-petal {
            position: absolute;
            top: -10vh;
            font-size: 1.8rem;
            pointer-events: none;
            animation: falling 8s linear infinite;
            filter: drop-shadow(0 0 8px rgba(255, 182, 193, 0.6));
        }

        @keyframes pulseText {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @keyframes falling {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translate(80px, 110vh) rotate(360deg); opacity: 0; }
        }

        /* LANDING PAGE */
        #landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2c1218, #110507);
            z-index: 1000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: transform 1.2s cubic-bezier(0.86, 0, 0.07, 1), opacity 1.2s ease;
            overflow: hidden;
            cursor: pointer;
        }

        .landing-content {
            text-align: center;
            z-index: 2;
            pointer-events: none;
        }

        .landing-content h1 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            color: var(--c-primary);
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
        }

        .landing-content p {
            font-size: 1.1rem;
            color: var(--c-text-muted);
            letter-spacing: 2px;
            animation: pulseText 2s infinite alternate;
        }

        /* MAIN DASHBOARD & ORBIT SYSTEM */
        .dashboard {
            position: relative;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10;
        }

        .main-title {
            position: absolute; top: 12%; text-align: center;
            z-index: 55;
        }
        .main-title h3 {
            font-size: 0.85rem; letter-spacing: 5px; text-transform: uppercase;
            color: var(--c-text-muted); margin-bottom: 5px;
        }
        .main-title h1 {
            font-size: 3.2rem; font-family: var(--font-serif);
            background: linear-gradient(to right, #FFF, var(--c-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .orbit-container {
            position: relative;
            width: 100%; max-width: 1050px; height: 650px;
            display: flex; justify-content: center; align-items: center;
            margin-top: 4vh;
        }

        /* GARIS LINTASAN ELIPS (POSISI DIATUR DINAMIS VIA JS AGAR SEDIKIT KE ATAS) */
        .orbit-line {
            position: absolute;
            border: 1.5px dashed rgba(255, 182, 193, 0.18);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 20px rgba(255, 182, 193, 0.03);
            transform: translate(-50%, -50%);
            left: 50%;
        }

        /* PURE HEART */
        .pure-heart {
            width: 230px; height: 230px;
            position: absolute; 
            z-index: 60; 
            filter: drop-shadow(0 10px 30px rgba(255, 71, 87, 0.55));
            cursor: pointer;
            transition: filter 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .pure-heart:hover {
            filter: drop-shadow(0 15px 40px rgba(255, 71, 87, 0.8));
            transform: scale(1.05);
        }
        .pure-heart:active {
            transform: scale(0.95);
        }
        .pure-heart svg {
            width: 100%; height: 100%;
            fill: url(#heart-gradient);
        }

        .box-wrapper {
            position: absolute;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            will-change: transform, z-index, opacity;
        }

        /* KOTAK MINIMALIS SEPERTI BADGE DI SCREENSHOT */
        .box-item {
            width: 125px; height: 85px; 
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            justify-content: center; align-items: center;
            cursor: pointer;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            background-size: cover;
            background-position: center;
        }
        
        .box-item:active {
            transform: scale(0.90) !important;
        }

        .box-wrapper:hover .box-item {
            border-color: var(--c-primary);
            box-shadow: 0 0 30px rgba(255, 182, 193, 0.5);
        }

        /* OVERLAY BERSIH TANPA EMOJI */
        .box-overlay {
            position: absolute; 
            inset: 0; 
            background: rgba(17, 5, 7, 0.35);
            transition: background 0.3s;
        }
        .box-wrapper:hover .box-overlay { 
            background: rgba(17, 5, 7, 0.1); 
        }

        /* LABEL BADGE DI BAWAH KOTAK */
        .box-label-pill {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 5px 14px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--c-text-main);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            white-space: nowrap;
            transition: background 0.3s, border-color 0.3s;
        }
        .box-wrapper:hover .box-label-pill {
            background: rgba(26, 11, 14, 0.8);
            border-color: rgba(255, 182, 193, 0.3);
        }

        /* MODALS & OVERLAYS */
        .page-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 11, 14, 0.95);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 200;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transform: scale(0.9) translateY(30px);
            transition: var(--transition-modal);
            cursor: pointer; 
        }
        .page-overlay.active {
            opacity: 1; visibility: visible;
            transform: scale(1) translateY(0);
        }

        .content-container {
            cursor: default; 
            width: 90%; max-width: 650px; max-height: 85vh;
            display: flex; flex-direction: column; align-items: center;
            position: relative;
            z-index: 202;
        }

        .close-hint {
            position: absolute; bottom: -45px;
            color: var(--c-text-muted); font-size: 0.9rem;
            letter-spacing: 1px; opacity: 0.7;
            pointer-events: none;
            animation: pulseText 2s infinite alternate;
        }

        .photo-viewer img {
            max-width: 100%; max-height: 70vh;
            border-radius: 15px; border: 2px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            object-fit: contain;
        }
        .photo-caption {
            margin-top: 20px; font-family: var(--font-serif);
            font-size: 1.5rem; color: var(--c-primary); font-style: italic;
        }

        .embed-wrapper {
            width: 100%; max-width: 650px;
            background: var(--glass-bg); padding: 25px;
            border-radius: 24px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .video-container {
            position: relative; width: 100%; padding-bottom: 56.25%; 
            border-radius: 14px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .letter-paper {
            background: #fdfbf7; color: #4a3b3c;
            padding: 40px; border-radius: 15px; width: 100%; max-width: 650px;
            box-shadow: inset 0 0 30px rgba(183, 110, 121, 0.1), 0 20px 50px rgba(0,0,0,0.5);
            position: relative; overflow-y: auto; max-height: 75vh;
        }
        .letter-greeting { font-family: var(--font-serif); font-size: 1.6rem; margin-bottom: 20px; font-weight: 600; }
        .letter-body { font-family: var(--font-serif); font-size: 1.15rem; line-height: 1.8; margin-bottom: 30px; }
        .letter-signature { font-family: var(--font-script); font-size: 2.2rem; text-align: right; color: var(--c-bg-light); opacity: 0; transition: opacity 1s; }
        .typewriter-cursor { display: inline-block; width: 2px; height: 1em; background: #4a3b3c; animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }

        .wa-box {
            background: rgba(255, 255, 255, 0.09); border: 1px solid var(--glass-border);
            padding: 30px; border-radius: 24px; width: 100%; max-width: 500px;
            text-align: center; box-shadow: var(--glass-shadow); backdrop-filter: blur(10px);
        }
        .wa-title { font-family: var(--font-serif); color: var(--c-primary); margin-bottom: 10px; font-size: 1.8rem; }
        .wa-desc { font-size: 0.9rem; color: var(--c-text-muted); margin-bottom: 20px; line-height: 1.4; }
        .wa-textarea {
            width: 100%; height: 120px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border); border-radius: 14px; color: #fff;
            padding: 15px; font-family: var(--font-sans); font-size: 0.95rem;
            resize: none; margin-bottom: 20px; outline: none; transition: border-color 0.3s;
        }
        .wa-textarea:focus { border-color: var(--c-primary); }
        .wa-btn {
            background: linear-gradient(135deg, var(--c-primary), #ff8b9e);
            color: var(--c-bg-dark); border: none; padding: 12px 35px; font-weight: 600;
            border-radius: 30px; cursor: pointer; font-family: var(--font-sans); font-size: 1rem;
            letter-spacing: 1px; transition: transform 0.2s, box-shadow 0.3s;
        }
        .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255, 182, 193, 0.4); }

        @media (max-width: 768px) {
            .orbit-container { max-width: 100%; height: 520px; }
            .box-item { width: 80px; height: 60px; border-radius: 14px; }
            .box-label-pill { font-size: 0.55rem; letter-spacing: 0.8px; padding: 3px 8px; margin-top: 6px; }
            .pure-heart { width: 160px; height: 160px; }
            .main-title { top: 10%; }
            .main-title h1 { font-size: 2.2rem; }
            .letter-paper { padding: 25px; }
            .landing-content h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div id="particle-container"></div>

    <svg style="width:0; height:0; position:absolute;" aria-hidden="true" focusable="false">
        <defs>
            <radialGradient id="heart-gradient" cx="35%" cy="35%" r="65%">
                <stop offset="0%" stop-color="#fff5f7" />
                <stop offset="25%" stop-color="#ffb6c1" />
                <stop offset="75%" stop-color="#ff4757" />
                <stop offset="100%" stop-color="#b01e2c" />
            </radialGradient>
        </defs>
    </svg>

    <div id="landing-page" onclick="masukHome()">
        <div class="landing-content">
            <h1>For Me</h1>
            <p></p>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="main-title">
            <h3>PERCOBAAN</h3>
            <h1>CONTOH</h1>
        </div>

        <div class="orbit-container" id="orbit-container">
            <div class="orbit-line" id="orbit-line"></div>

            <div class="pure-heart" onclick="openPage('page-whatsapp')">
                <svg viewBox="0 0 32 29.6">
                    <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                    c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
                </svg>
            </div>

            <div class="box-wrapper">
                <div class="box-item" data-target="page-photo1" style="background-image: url('1.jpg');">
                    <div class="box-overlay"></div>
                </div>
                <div class="box-label-pill">Memori 1</div>
            </div>
            
            <div class="box-wrapper">
                <div class="box-item" data-target="page-photo2" style="background-image: url('2.jpg');">
                    <div class="box-overlay"></div>
                </div>
                <div class="box-label-pill">Memori 2</div>
            </div>
            
            <div class="box-wrapper">
                <div class="box-item" data-target="page-photo3" style="background-image: url('3.jpg');">
                    <div class="box-overlay"></div>
                </div>
                <div class="box-label-pill">Memori 3</div>
            </div>

            <div class="box-wrapper">
                <div class="box-item" data-target="page-music" style="background-image: url('About.jpg');">
                    <div class="box-overlay"></div>
                </div>
                <div class="box-label-pill">Spotify</div>
            </div>

            <div class="box-wrapper">
                <div class="box-item" data-target="page-letter" style="background-image: url('Surat.jpg');">
                    <div class="box-overlay"></div>
                </div>
                <div class="box-label-pill">Surat</div>
            </div>

            <div class="box-wrapper">
                <div class="box-item" data-target="page-video" style="background-image: url('https://img.youtube.com/vi/tGv7CUutzqU/hqdefault.jpg');">
                    <div class="box-overlay"></div>
                </div>
                <div class="box-label-pill">YouTube</div>
            </div>
        </div>
    </div>

    <div class="page-overlay photo-overlay" id="page-photo1">
        <div class="content-container photo-viewer">
            <img src="1.jpg" alt="Foto 1">
            <div class="photo-caption">Malam pertama kali bertemu...</div>
            <span class="close-hint"></span>
        </div>
    </div>

    <div class="page-overlay photo-overlay" id="page-photo2">
        <div class="content-container photo-viewer">
            <img src="2.jpg" alt="Foto 2">
            <div class="photo-caption">Senyum yang paling aku suka.</div>
            <span class="close-hint"></span>
        </div>
    </div>

    <div class="page-overlay photo-overlay" id="page-photo3">
        <div class="content-container photo-viewer">
            <img src="3.jpg" alt="Foto 3">
            <div class="photo-caption">Dunia kecil kita.</div>
            <span class="close-hint"></span>
        </div>
    </div>

    <div class="page-overlay" id="page-music">
        <div class="content-container">
            <div class="embed-wrapper" style="background: #282828; border: 1px solid #333;">
                <h2 style="font-family: var(--font-serif); margin-bottom: 20px; text-align: center; color: #1DB954;">About You</h2>
                <iframe
                    title="Spotify Embed: Recommendation Playlist"
                    src="https://open.spotify.com/embed/playlist/4FiErYsSUjl8dVhrcN34TG?utm_source=generator&theme=0"
                    width="100%"
                    height="380"
                    style="border-radius: 12px; border: none;"
                    frameBorder="0"
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy">
                </iframe>
            </div>
            <span class="close-hint"></span>
        </div>
    </div>

    <div class="page-overlay" id="page-video">
        <div class="content-container">
            <div class="embed-wrapper">
                <h2 style="font-family: var(--font-serif); margin-bottom: 20px; text-align: center;">About You</h2>
                <div class="video-container">
                    <iframe 
                        src="https://www.youtube.com/embed/tGv7CUutzqU?autoplay=0&rel=0" 
                        title="YouTube video player" frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
            <span class="close-hint"></span>
        </div>
    </div>

    <div class="page-overlay" id="page-letter">
        <div class="content-container">
            <div class="letter-paper">
                <div class="letter-greeting">Dli?</div>
                <div class="letter-body" id="typewriter-container"></div>
                <div class="letter-signature" id="letter-sig">- Dli</div>
            </div>
            <span class="close-hint"></span>
        </div>
    </div>

    <div class="page-overlay" id="page-whatsapp">
        <div class="content-container">
            <div class="wa-box">
                <h2 class="wa-title">Kirim Pesan 💌</h2>
                <p class="wa-desc">Tulis apa saja yang ingin kamu katakan sekarang, pesanmu akan langsung terkirim ke WhatsApp-nya!</p>
                <textarea class="wa-textarea" id="wa-text-message" placeholder="Ketik Disini Untuk Pesan."></textarea>
                                <br>
                <button class="wa-btn" onclick="kirimWhatsApp()">Kirim Lewat WhatsApp</button>
            </div>
            <span class="close-hint"></span>
        </div>
    </div>

    <script>
        /* LOGIKA JATUHAN BUNGA */
        const particleTypes = ['🌸', '💖', '✨', '💮', '💕'];
        const pContainer = document.getElementById('particle-container');

        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('flower-petal');
            petal.innerHTML = particleTypes[Math.floor(Math.random() * particleTypes.length)];
            petal.style.left = `${Math.random() * 100}vw`;
            petal.style.animationDuration = `${Math.random() * 4 + 5}s`; 
            pContainer.appendChild(petal);
            setTimeout(() => petal.remove(), 8000);
        }
        setInterval(createPetal, 120);

        function masukHome() {
            const landing = document.getElementById('landing-page');
            landing.style.transform = 'translateY(-100%)';
            landing.style.opacity = '0';
            setTimeout(() => { landing.style.display = 'none'; }, 1200);
        }

        /* PERBAIKAN: UKURAN LINGKARAN DIPERKECIL & DIGESER KE ATAS */
        const wrappers = document.querySelectorAll('.box-wrapper');
        let angleOffset = 0;
        const speed = 0.004; 
        
        let radiusX, radiusY, yOffset;
        function updateDimensions() {
            // Ukuran radius diperkecil agar lingkaran lebih pas & kompak
            radiusX = window.innerWidth < 768 ? 145 : 340; 
            radiusY = window.innerWidth < 768 ? 80 : 135;  
            
            // Jarak offset vertikal untuk menggeser orbit & garisnya sedikit ke atas
            yOffset = window.innerWidth < 768 ? -15 : -30;

            // Mengatur posisi dan dimensi garis bantu elips agar presisi
            const orbitLine = document.getElementById('orbit-line');
            if (orbitLine) {
                orbitLine.style.width = `${radiusX * 2}px`;
                orbitLine.style.height = `${radiusY * 2}px`;
                orbitLine.style.top = `calc(50% + ${yOffset}px)`;
            }
        }
        updateDimensions();
        window.addEventListener('resize', updateDimensions);
        
        function animateOrbit() {
            angleOffset += speed; 

            wrappers.forEach((wrapper, i) => {
                const angle = (i * (Math.PI * 2) / wrappers.length) + angleOffset;
                const x = Math.cos(angle) * radiusX;
                // Nilai y ditambahkan yOffset agar seluruh posisi objek terangkat sedikit ke atas
                const y = (Math.sin(angle) * radiusY) + yOffset; 

                const factor = (Math.sin(angle) + 1) / 2; 

                const depthScale = (factor * 0.65) + 0.35; 
                const opacity = (factor * 0.95) + 0.05;
                const zIndex = Math.round(factor * 100);

                wrapper.style.transform = `translate(${x}px, ${y}px) scale(${depthScale})`;
                wrapper.style.zIndex = zIndex;
                wrapper.style.opacity = opacity;
                
                wrapper.style.pointerEvents = opacity < 0.25 ? 'none' : 'auto';
            });

            requestAnimationFrame(animateOrbit);
        }
        animateOrbit();

        /* INTERAKSI MODAL DENGAN TRANSISI HALUS */
        const boxes = document.querySelectorAll('.box-item');
        boxes.forEach(box => {
            box.addEventListener('click', function(e) {
                e.stopPropagation(); 
                const targetId = this.getAttribute('data-target');
                
                this.style.transform = 'scale(0.88)';
                setTimeout(() => {
                    this.style.transform = '';
                    openPage(targetId);
                }, 100);
            });
        });

        function openPage(pageId) {
            const page = document.getElementById(pageId);
            if(page) {
                page.classList.add('active');
                if(pageId === 'page-letter' && !isTyped) {
                    startTypewriter();
                }
            }
        }

        function closePage(pageId) {
            const page = document.getElementById(pageId);
            if(page) {
                page.classList.remove('active');
                if(pageId === 'page-video') {
                    const iframe = page.querySelector('iframe');
                    if(iframe) iframe.src = iframe.src; 
                }
            }
        }

        document.querySelectorAll('.page-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (this.classList.contains('photo-overlay')) {
                    closePage(this.id);
                } else {
                    if (e.target === this) {
                        closePage(this.id);
                    }
                }
            });
        });

        /* TYPEWRITER SURAT */
        const letterText = `Ada orang yang datangnya pelan-pelan, tapi tanpa sadar jadi bagian paling hangat di hati. Buatku, orang itu kamu.<br><br>Aku suka caramu hadir di hari-hariku. Kadang lewat pesan singkat, kadang lewat tawa kecil, kadang cuma dari hal sederhana yang mungkin kamu sendiri nggak sadar.<br><br>Tapi entah kenapa, semuanya bisa bikin hariku terasa lebih baik. Kalau suatu hari kamu merasa biasa aja, aku mau kamu ingat satu hal: di mataku, kamu tetap istimewa.<br><br>Terima kasih ya telah hadir dalam hidupku. Lov uu.`;
        const typeContainer = document.getElementById('typewriter-container');
        const sigContainer = document.getElementById('letter-sig');
        let isTyped = false;
        
        function startTypewriter() {
            isTyped = true; 
            typeContainer.innerHTML = '';
            const textSpan = document.createElement('span');
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'typewriter-cursor';
            typeContainer.appendChild(textSpan);
            typeContainer.appendChild(cursorSpan);
            
            let i = 0; let isTag = false; let text = '';
            function type() {
                if (i < letterText.length) {
                    const char = letterText.charAt(i); text += char;
                    if (char === '<') isTag = true;
                    if (char === '>') isTag = false;
                    if (isTag) { i++; type(); return; }
                    textSpan.innerHTML = text; i++;
                    setTimeout(type, Math.random() * 15 + 10); 
                } else {
                    setTimeout(() => { cursorSpan.remove(); sigContainer.style.opacity = '1'; }, 500);
                }
            }
            setTimeout(type, 600); 
        }

        function kirimWhatsApp() {
            const nomorMasRaka = "628881584868"; 
            const isiPesan = document.getElementById('wa-text-message').value;
            if(!isiPesan.trim()) {
                alert("Kolom pesan masih kosong nih, ketik sesuatu dulu ya...");
                return;
            }
            const linkWA = `https://api.whatsapp.com/send?phone=${nomorMasRaka}&text=${encodeURIComponent(isiPesan)}`;
            window.open(linkWA, '_blank');
        }
    </script>
